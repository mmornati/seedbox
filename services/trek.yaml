services:
  trek:
    image: mauriceboe/nomad:latest
    container_name: trek
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FORCE_HTTPS=false
      - TRUST_PROXY=1
      - ALLOWED_ORIGINS=https://trek.${TRAEFIK_DOMAIN}
      - EXTERNAL_URL=https://trek.${TRAEFIK_DOMAIN}
    volumes:
      - trek-data:/app/data
      - trek-uploads:/app/uploads

volumes:
  trek-data:
    driver: local-persist
    driver_opts:
      mountpoint: $CONFIG_PATH/trek-data
  trek-uploads:
    driver: local-persist
    driver_opts:
      mountpoint: $CONFIG_PATH/trek-uploads
