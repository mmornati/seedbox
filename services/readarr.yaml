services:
  readarr:
    image: lscr.io/linuxserver/readarr:nightly
    container_name: readarr
    restart: always
    volumes:
      - readarrconfig:/config
      - readarrmedia:/torrents
      - readarrdownloads:/downloads
      - readarrmedia2:/media
      - calibrelibrary:/mnt
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PGID=${PGID}
      - PUID=${PUID}
      - TZ=${TZ}

volumes:
  readarrmedia:
    driver: local-persist
    driver_opts:
      mountpoint: $HOST_MEDIA_PATH
  readarrmedia2:
    driver: local-persist
    driver_opts:
      mountpoint: $HOST_MEDIA_PATH_2
  readarrconfig:
    driver: local-persist
    driver_opts:
      mountpoint: $CONFIG_PATH/readarr
  calibrelibrary:
    driver: local-persist
    driver_opts:
      mountpoint: $CONFIG_PATH/calibre
  readarrdownloads:
    driver: local-persist
    driver_opts:
      mountpoint: $HOST_MEDIA_PATH/$DOWNLOAD_SUBFOLDER
